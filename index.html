<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Idea BookLand</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="app-logo.png">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Open+Sans:wght@400;600&family=Lato:wght@400;700&family=Montserrat:wght@400;600&family=Oswald:wght@400;500&family=Source+Sans+Pro:wght@400;600&family=Slabo+27px&family=Raleway:wght@400;600&family=PT+Sans:wght@400;700&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================
           Minimalist White Theme (Mi Notes Inspiration)
           ========================================================== */
        :root {
            --bg: #ffffff;             
            --surface: #f9f9f9;        
            --text-main: #1a1a1a;        
            --text-muted: #888888;       
            --border: #eeeeee;         
            --accent: #ffbb00; /* Signature Yellow FAB */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; 
            font-family: 'Roboto', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            height: 100vh; overflow: hidden; 
        }

        /* --- Splash Screen --- */
        #splashScreen {
            position: fixed; inset: 0;
            background: #ffffff; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        .splash-logo {
            width: 100px;
            animation: popUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popUp {
            0% { transform: scale(0.3); opacity: 0; }
            70% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* --- Core Layout & Screens --- */
        .screen { position: fixed; inset: 0; display: none; opacity: 0; transition: 0.3s ease; padding: 20px; overflow-y: auto; }
        .screen.active { display: block; opacity: 1; }

        .slide-up { animation: slideUp 0.35s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* --- Home Screen Typography --- */
        .page-title { font-size: 2.2rem; font-weight: 500; margin: 20px 0 30px 0; letter-spacing: -0.5px; }
        
        .stats-container { display: flex; gap: 12px; margin-bottom: 24px; }
        .stat-box { background: var(--surface); padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border); flex: 1; }
        .stat-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); display: block; margin-bottom: 4px; }
        .stat-num { font-size: 1.5rem; font-weight: 600; color: var(--text-main); }

        /* --- Note Cards --- */
        .note-list { display: flex; flex-direction: column; gap: 12px; padding-bottom: 90px; }
        .card { 
            background: var(--surface); 
            border-radius: 16px; 
            padding: 18px; 
            border: 1px solid var(--border); 
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            position: relative;
        }
        .card h4 { margin: 0 0 6px 0; font-size: 1.1rem; font-weight: 500; }
        .card-excerpt { font-size: 0.9rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 12px; }
        .card-meta { display: flex; justify-content: space-between; font-size: 0.75rem; color: #a0a0a0; border-top: 1px solid var(--border); padding-top: 10px; }
        
        .delete-btn { position: absolute; top: 16px; right: 16px; background: transparent; border: none; font-size: 1.2rem; color: #ff3b30; cursor: pointer; padding: 5px; }

        /* --- Glowing Category Tags --- */
        .tag { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; color: white; text-transform: uppercase; margin-bottom: 10px; }
        .tag-Business { background: #007aff; box-shadow: 0 2px 8px rgba(0,122,255,0.4); }
        .tag-Personal { background: #34c759; box-shadow: 0 2px 8px rgba(52,199,89,0.4); }
        .tag-Important { background: #ff3b30; box-shadow: 0 2px 8px rgba(255,59,48,0.4); }
        .tag-Finances { background: #ff9500; box-shadow: 0 2px 8px rgba(255,149,0,0.4); }
        .tag-Family { background: #af52de; box-shadow: 0 2px 8px rgba(175,82,222,0.4); }
        .tag-Education { background: #5856d6; box-shadow: 0 2px 8px rgba(88,86,214,0.4); }
        .tag-Research { background: #00c7be; box-shadow: 0 2px 8px rgba(0,199,190,0.4); }
        .tag-Other { background: #8e8e93; box-shadow: 0 2px 8px rgba(142,142,147,0.4); }

        /* --- Floating Action Button --- */
        .fab {
            position: fixed; bottom: 30px; right: 30px;
            width: 60px; height: 60px; border-radius: 50%;
            background: var(--accent); color: white;
            font-size: 32px; font-weight: 300;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 8px 20px rgba(255, 187, 0, 0.4);
            cursor: pointer; z-index: 100; border: none;
        }

        /* --- Editor Screen --- */
        .editor-header { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .back-btn { background: transparent; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-main); padding: 5px; }
        
        .control-group { display: flex; gap: 8px; flex-wrap: wrap; }
        select, .export-btn {
            background: var(--surface); color: var(--text-main);
            border: 1px solid var(--border); border-radius: 8px;
            padding: 8px 12px; font-size: 0.85rem; outline: none;
        }
        .export-btn { font-weight: 600; cursor: pointer; color: var(--accent); }

        #titleInput { width: 100%; border: none; background: transparent; font-size: 1.8rem; font-weight: 600; outline: none; margin-bottom: 10px; color: var(--text-main); }
        #editor { width: 100%; min-height: 60vh; font-size: 1.1rem; line-height: 1.6; outline: none; padding-bottom: 40px; color: var(--text-main); }
        
        /* Color Palette for Text */
        .color-palette { display: flex; gap: 10px; padding: 15px 0; border-top: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
        .color-dot { width: 28px; height: 28px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 0 1px #ddd; cursor: pointer; flex-shrink: 0; }
    </style>
</head>
<body>

    <div id="splashScreen">
        <img src="app-logo.png" alt="Idea BookLand Logo" class="splash-logo">
    </div>

    <section id="homeScreen" class="screen active">
        <h1 class="page-title">Notes</h1>

        <div class="stats-container">
            <div class="stat-box">
                <span class="stat-label">Total Ideas</span>
                <span id="totalCount" class="stat-num">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Today</span>
                <span id="todayCount" class="stat-num" style="color: var(--accent);">0</span>
            </div>
        </div>

        <div class="note-list" id="noteGrid">
            </div>

        <button class="fab" onclick="openNote(null)">+</button>
    </section>

    <section id="canvasScreen" class="screen slide-up">
        <div class="editor-header">
            <button class="back-btn" onclick="triggerBack()">←</button>
            <div class="control-group">
                <select id="categorySelect" onchange="save()">
                    <option value="Other">Category</option>
                    <option value="Business">Business</option>
                    <option value="Personal">Personal</option>
                    <option value="Important">Important</option>
                    <option value="Finances">Finances</option>
                    <option value="Family">Family</option>
                    <option value="Education">Education</option>
                    <option value="Research">Research</option>
                    <option value="Other">Other</option>
                </select>
                <select id="fontSelect" onchange="changeFont(this.value)">
                    <option value="'Roboto', sans-serif">Roboto</option>
                    <option value="'Open Sans', sans-serif">Open Sans</option>
                    <option value="'Lato', sans-serif">Lato</option>
                    <option value="'Montserrat', sans-serif">Montserrat</option>
                    <option value="'Oswald', sans-serif">Oswald</option>
                    <option value="'Source Sans Pro', sans-serif">Source Sans</option>
                    <option value="'Slabo 27px', serif">Slabo 27px</option>
                    <option value="'Raleway', sans-serif">Raleway</option>
                    <option value="'PT Sans', sans-serif">PT Sans</option>
                    <option value="'Merriweather', serif">Merriweather</option>
                </select>
                <button class="export-btn" onclick="saveAsImage('png')">PNG</button>
                <button class="export-btn" onclick="saveAsImage('jpg')">JPG</button>
            </div>
        </div>

        <input type="text" id="titleInput" placeholder="Title" oninput="save()">
        
        <div class="color-palette">
            <div class="color-dot" style="background: #1a1a1a" onclick="changeTextColor('#1a1a1a')"></div>
            <div class="color-dot" style="background: #ff3b30" onclick="changeTextColor('#ff3b30')"></div>
            <div class="color-dot" style="background: #007aff" onclick="changeTextColor('#007aff')"></div>
            <div class="color-dot" style="background: #34c759" onclick="changeTextColor('#34c759')"></div>
            <div class="color-dot" style="background: #ff9500" onclick="changeTextColor('#ff9500')"></div>
            <div class="color-dot" style="background: #af52de" onclick="changeTextColor('#af52de')"></div>
        </div>

        <div id="editor" contenteditable="true" data-placeholder="Start writing your idea..." oninput="save()"></div>
    </section>

    <script>
        // ========================================
        // Service Worker & Splash Screen
        // ========================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splashScreen');
                splash.style.opacity = '0';
                splash.style.visibility = 'hidden';
            }, 1200);
        });

        // ========================================
        // IndexedDB Database Setup 
        // ========================================
        const DB_NAME = 'IdeaBookLand';
        const DB_VERSION = 2; // Incremented for new data schema
        const STORE_NAME = 'notes';
        let db = null;

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => { db = request.result; resolve(db); };
                request.onupgradeneeded = (event) => {
                    const database = event.target.result;
                    if (!database.objectStoreNames.contains(STORE_NAME)) {
                        database.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                };
            });
        }

        function getAllNotes() {
            return new Promise((resolve) => {
                if (!db) return resolve([]);
                const request = db.transaction([STORE_NAME], 'readonly').objectStore(STORE_NAME).getAll();
                request.onsuccess = () => resolve(request.result);
            });
        }

        function getNoteById(id) {
            return new Promise((resolve) => {
                const request = db.transaction([STORE_NAME], 'readonly').objectStore(STORE_NAME).get(id);
                request.onsuccess = () => resolve(request.result);
            });
        }

        function saveNoteToDB(note) {
            return new Promise((resolve) => {
                const request = db.transaction([STORE_NAME], 'readwrite').objectStore(STORE_NAME).put(note);
                request.onsuccess = () => resolve();
            });
        }

        function deleteNoteFromDB(id) {
            return new Promise((resolve) => {
                const request = db.transaction([STORE_NAME], 'readwrite').objectStore(STORE_NAME).delete(id);
                request.onsuccess = () => resolve();
            });
        }

        // ========================================
        // Navigation & Hardware Back Button
        // ========================================
        let activeId = null;

        window.addEventListener('popstate', (event) => {
            if (!event.state || event.state.page !== 'editor') {
                closeNoteWithoutHistory();
            }
        });

        function triggerBack() {
            history.back(); // Triggers the popstate event naturally
        }

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // ========================================
        // UI & App Logic
        // ========================================
        async function init() {
            await initDB();
            await renderHome();
        }

        async function renderHome() {
            const list = document.getElementById('noteGrid');
            list.innerHTML = ''; 
            
            const notes = await getAllNotes();
            notes.sort((a, b) => b.id - a.id); // Newest first
            
            let todayCount = 0;
            const todayStr = new Date().toLocaleDateString();

            notes.forEach(n => {
                if(n.dateStr === todayStr) todayCount++;

                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openNote(n.id);
                
                // Strip HTML for excerpt
                const rawText = n.content.replace(/<[^>]*>?/gm, '');
                const excerpt = rawText.length > 0 ? rawText : 'No text';

                card.innerHTML = `
                    <div class="tag tag-${n.category || 'Other'}">${n.category || 'Other'}</div>
                    <button class="delete-btn" onclick="event.stopPropagation(); deleteNote(${n.id})">🗑</button>
                    <h4>${n.title || 'Untitled Idea'}</h4>
                    <div class="card-excerpt">${excerpt}</div>
                    <div class="card-meta">
                        <span>${n.dateStr}</span>
                        <span>${n.timeStr}</span>
                    </div>
                `;
                list.appendChild(card);
            });
            
            document.getElementById('totalCount').innerText = notes.length;
            document.getElementById('todayCount').innerText = todayCount;
        }

        async function openNote(id) {
            history.pushState({ page: 'editor' }, 'Editor', '#editor');
            
            if(!id) {
                const now = new Date();
                const n = { 
                    id: Date.now(), 
                    title: "", 
                    content: "", 
                    category: "Other",
                    dateStr: now.toLocaleDateString(),
                    timeStr: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                    font: "'Roboto', sans-serif"
                };
                await saveNoteToDB(n);
                activeId = n.id;
            } else {
                activeId = id;
            }

            const note = await getNoteById(activeId);
            document.getElementById('titleInput').value = note.title;
            document.getElementById('editor').innerHTML = note.content;
            document.getElementById('categorySelect').value = note.category || 'Other';
            
            // Set Font
            const fontToSet = note.font || "'Roboto', sans-serif";
            document.getElementById('fontSelect').value = fontToSet;
            document.getElementById('editor').style.fontFamily = fontToSet;
            document.getElementById('titleInput').style.fontFamily = fontToSet;

            switchScreen('canvasScreen');
        }

        async function closeNoteWithoutHistory() { 
            activeId = null;
            switchScreen('homeScreen'); 
            await renderHome(); 
        }

        async function save() {
            if (!activeId) return;
            const note = await getNoteById(activeId);
            if(note) {
                note.title = document.getElementById('titleInput').value;
                note.content = document.getElementById('editor').innerHTML;
                note.category = document.getElementById('categorySelect').value;
                note.font = document.getElementById('fontSelect').value;
                await saveNoteToDB(note);
            }
        }

        async function deleteNote(id) {
            if (confirm("Delete this idea completely?")) {
                await deleteNoteFromDB(id);
                await renderHome();
            }
        }
        // 
========================================
        // Text Tools & Native Image Cropping Export
        // ========================================
        function changeFont(fontVal) {
            document.getElementById('editor').style.fontFamily = fontVal;
            document.getElementById('titleInput').style.fontFamily = fontVal;
            save();
        }

        function changeTextColor(color) {
            document.execCommand('styleWithCSS', false, true);
            document.execCommand('foreColor', false, color);
            document.getElementById('editor').focus();
            save();
        }

        // Crops text naturally to an HTML5 Canvas and exports
        function saveAsImage(format) {
            const title = document.getElementById('titleInput').value || 'Idea';
            const textContent = document.getElementById('editor').innerText;
            const category = document.getElementById('categorySelect').value;
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 600; 
            
      // Text measurement & word wrap algorithm
            ctx.font = '16px ' + document.getElementById('fontSelect').value;
            const words = textContent.split(/\s+/);
            let lines = [];
            let currentLine = '';
            
            words.forEach(word => {
                let testLine = currentLine + word + ' ';
                if(ctx.measureText(testLine).width > 520 && currentLine !== '') {
                    lines.push(currentLine); currentLine = word + ' ';
                } else { currentLine = testLine; }
            });
            if(currentLine) lines.push(currentLine);
            
            // Dynamic Height cropping based exactly on text length
            canvas.height = 120 + (lines.length * 28);
            if(canvas.height < 400) canvas.height = 400; // Minimum crop height
            
            // Draw Background
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw Title
            ctx.fillStyle = '#1a1a1a';
            ctx.font = 'bold 26px sans-serif';
            ctx.fillText(title, 40, 60);
            
            // Draw Category Tag
            ctx.fillStyle = '#ffbb00';
            ctx.font = 'bold 12px sans-serif';
            ctx.fillText(category.toUpperCase(), 40, 85);
            
            // Draw Main Content
            ctx.fillStyle = '#1a1a1a';
            ctx.font = '16px ' + document.getElementById('fontSelect').value;
            lines.forEach((line, i) => {
                ctx.fillText(line, 40, 130 + (i * 28));
            });
            
            // Trigger Download
            const a = document.createElement('a');
            const timeString = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}).replace(':', '');
            a.download = `Idea_${category}_${timeString}.${format}`;
            a.href = canvas.toDataURL(format === 'jpg' ? 'image/jpeg' : 'image/png');
            a.click();
        }

        init();
    </script>
</body>
</html>
